# split panes using | and -
bind | split-window -h
bind _ split-window -v
unbind '"'
unbind %

# Enable mouse mode
set -g mouse on

# Start window numbering at 1
set -g base-index 1

# Default shell (uses $SHELL, works on macOS and Linux)
set-option -g default-shell /bin/zsh

######################
### DESIGN CHANGES ###
######################

set -g status-justify left
set -g status-interval 2

# loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# The modes
setw -g clock-mode-colour colour135
setw -g mode-style fg=colour196,bg=colour238,bold

# The panes
set -g pane-border-style bg=colour235,fg=colour238
set -g pane-active-border-style bg=colour236,fg=colour51


# The statusbar
set -g status-position bottom
set -g status-style bg=colour234,fg=colour137,dim
set -g status-left ''
set -g status-right '#h [#{session_name}] #[fg=colour233,bg=colour241,bold] %a %m/%d/%y #[fg=colour233,bg=colour245,bold] #(TZ="US/Central" date +%%r) '
set -g status-right-length 80
set -g status-left-length 20

setw -g window-status-current-style bg=colour238,fg=colour81,bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

setw -g window-status-style bg=colour235,fg=colour138,none
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

setw -g window-status-bell-style fg=colour255,bg=colour1,bold

set -g message-style fg=colour232,bg=colour166,bold

# Shift+Enter creates a new line
bind -n S-Enter send-keys Escape "[13;2u"


# reload config shortcut to "ctrl+b r"
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."